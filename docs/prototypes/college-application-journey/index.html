<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Journey · Apply to 4-Year Colleges</title>
<style>
  :root {
    --bg: #060a22;
    --app: #0a1234;
    --card-navy: #0e1844;
    --card-navy-2: #13205a;
    --line: #20305f;
    --line-soft: #1a2750;
    --blue: #5b8cff;
    --blue-bright: #3b6dff;
    --text: #ffffff;
    --text-dim: #b6c0e0;
    --text-faint: #7a86b4;
    /* content card (light) */
    --paper: #eef3fd;
    --ink: #16213d;
    --ink-soft: #3c486a;
    --ink-faint: #8b95b3;
    --paper-line: #d8e0f0;
    --green: #2bb673;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --icon-grad: linear-gradient(135deg, #ffb155 0%, #ff5e87 45%, #7b6cff 100%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.5; padding: 30px 26px 26px; }
  button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #1d2b57; border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
  .paper ::-webkit-scrollbar-thumb { background: #cdd6ea; }

  .brand { position: fixed; top: 12px; left: 28px; font-size: 13px; color: #46517d; font-weight: 600; letter-spacing: .01em; }

  /* ---------------- App shell ---------------- */
  .app { display: grid; grid-template-columns: 372px 1fr; height: calc(100vh - 56px); background: var(--app); border: 1px solid #131d44; border-radius: 22px; overflow: hidden; }
  .sidebar { overflow-y: auto; padding: 18px 18px 30px; }
  .main { position: relative; overflow-y: auto; padding: 26px 26px 26px 8px; }

  /* ---------------- Sidebar shared ---------------- */
  .nav-btn { display: inline-flex; align-items: center; gap: 9px; padding: 11px 18px 11px 14px; border-radius: 99px; background: #101b46; border: 1px solid #25356a; color: var(--blue); font-weight: 700; font-size: 14px; }
  .nav-btn:hover { background: #14224f; }
  .nav-btn .arr { font-size: 17px; line-height: 1; margin-top: -1px; }

  .journey-head { margin: 16px 4px 18px; }
  .kick { color: var(--blue); font-weight: 700; font-size: 13px; }
  .journey-title { font-size: 22px; font-weight: 750; margin: 4px 0 14px; line-height: 1.2; }
  .pbar { height: 8px; border-radius: 99px; background: #16224f; overflow: hidden; }
  .pbar > span { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b6dff, #5b8cff); transition: width .4s ease; }

  /* ---- Part accordion (journey view) ---- */
  .part { border-top: 1px solid var(--line-soft); }
  .part:last-child { border-bottom: 1px solid var(--line-soft); }
  .part-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 20px 6px; text-align: left; }
  .part-head .pt-body { flex: 1; min-width: 0; }
  .part-label { color: var(--blue); font-weight: 700; font-size: 13px; margin-bottom: 5px; }
  .part-title { font-size: 18px; font-weight: 700; line-height: 1.25; }
  .chev { color: var(--text-faint); font-size: 13px; transition: transform .25s ease; flex: none; }
  .part.open .chev { transform: rotate(180deg); }
  .part-body { display: none; padding: 0 2px 18px; }
  .part.open .part-body { display: block; }
  .part-body .proj-card { margin-bottom: 12px; }

  /* ---- Project card ---- */
  .proj-card { display: block; width: 100%; text-align: left; border-radius: 18px; overflow: hidden; position: relative; height: 188px; background: var(--card-navy-2); border: 1px solid var(--line); }
  button.proj-card { cursor: pointer; }
  button.proj-card:hover { border-color: #3a4f8f; }
  .proj-media { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .proj-media::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(8,12,38,.05) 30%, rgba(8,12,38,.92) 100%); }
  .proj-badge { position: absolute; top: 14px; left: 14px; z-index: 2; width: 34px; height: 34px; border-radius: 50%; background: #fff; color: #16213d; font-weight: 750; font-size: 15px; display: grid; place-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
  .proj-badge.done { background: var(--green); color: #fff; }
  .proj-name { position: absolute; left: 18px; right: 18px; bottom: 16px; z-index: 2; font-size: 18px; font-weight: 750; line-height: 1.2; color: #fff; }

  /* ---- Project view header ---- */
  .proj-pinned { margin: 18px 2px 10px; }

  /* ---- Step accordion (project view) ---- */
  .step { border-top: 1px solid var(--line-soft); }
  .step:last-child { border-bottom: 1px solid var(--line-soft); }
  .step-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 18px 6px; text-align: left; }
  .step-head .st-body { flex: 1; min-width: 0; }
  .step-label { color: var(--blue); font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .step-title { font-size: 17px; font-weight: 700; line-height: 1.25; }
  .step.open .chev { transform: rotate(180deg); }
  .step-body { display: none; padding: 0 2px 14px; }
  .step.open .step-body { display: block; }

  /* ---- Article row ---- */
  .art-row { width: 100%; display: flex; align-items: center; gap: 13px; padding: 8px; border-radius: 16px; text-align: left; background: transparent; border: 1px solid transparent; margin-bottom: 10px; }
  .art-row:hover { background: #122057; border-color: var(--line-soft); }
  .art-row.active { background: #14245f; border-color: #3a59b0; }
  .art-ico { width: 40px; height: 40px; border-radius: 12px; flex: none; background: var(--icon-grad); box-shadow: inset 0 0 0 1px rgba(255,255,255,.18); }
  .art-rbody { flex: 1; min-width: 0; }
  .art-rtitle { display: block; color: var(--blue); font-weight: 650; font-size: 14.5px; line-height: 1.25; }
  .art-mins { display: block; }
  .art-row.active .art-rtitle { color: #cdd9ff; }
  .art-mins { color: var(--text-faint); font-size: 12.5px; margin-top: 3px; }
  .art-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #3a4673; flex: none; display: grid; place-items: center; color: #fff; }
  .art-check:hover { border-color: var(--blue); }
  .art-row.done .art-check { background: var(--green); border-color: var(--green); }

  /* ---------------- Main / content card ---------------- */
  .toolbar { position: absolute; top: 22px; right: 18px; display: flex; flex-direction: column; gap: 12px; z-index: 4; }
  .tool { width: 60px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .tool .tbtn { width: 56px; height: 50px; border-radius: 15px; background: #101b46; border: 1px solid #25356a; display: grid; place-items: center; color: var(--blue); }
  .tool .tbtn:hover { background: #16224f; }
  .tool .tlabel { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.15; font-weight: 600; }

  .paper { background: var(--paper); color: var(--ink); border-radius: 26px; max-width: 880px; margin: 0 96px 0 auto; min-height: calc(100vh - 108px); padding: 44px 56px 48px; }
  @media (min-width: 1500px) { .paper { margin: 0 auto; } }
  .a-kick { color: var(--blue-bright); font-weight: 750; font-size: 14px; }
  .a-h1 { font-size: 38px; font-weight: 780; letter-spacing: -.02em; margin: 10px 0 14px; line-height: 1.08; color: #101a32; }
  .a-lead { font-size: 21px; line-height: 1.4; color: #1b2742; margin: 0 0 26px; font-weight: 450; }
  .a-fig { margin: 8px 0 26px; border-radius: 16px; overflow: hidden; background: var(--icon-grad); aspect-ratio: 16/9; }
  .a-fig img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .a-body p { font-size: 18px; line-height: 1.55; color: #23304f; margin: 0 0 16px; }
  .a-body p:last-child { margin-bottom: 0; }
  .a-body strong { color: #101a32; }

  .callout { background: #e2eaff; border: 1px solid #cdd9fb; border-radius: 14px; padding: 16px 18px; margin: 22px 0; font-size: 16px; color: #2a3a78; }
  .callout b { display: block; margin-bottom: 3px; }

  /* video */
  .vid { position: relative; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg, #1b2444, #3b6dff 140%); display: grid; place-items: center; margin: 8px 0 14px; }
  .vid .play { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,.95); display: grid; place-items: center; box-shadow: 0 8px 24px rgba(0,0,0,.3); }
  .vid .play:hover { transform: scale(1.05); }
  .vid .cap { position: absolute; left: 18px; bottom: 16px; color: #fff; }
  .vid .cap b { display: block; font-size: 15px; } .vid .cap span { font-size: 12.5px; opacity: .85; }

  /* interactive panels */
  .panel { border: 1px solid var(--paper-line); border-radius: 18px; background: #fff; padding: 22px; margin: 8px 0 14px; }
  .panel-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 750; letter-spacing: .05em; text-transform: uppercase; color: #6a73a8; margin-bottom: 12px; }
  .panel-tag .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--icon-grad); }
  .panel h3 { margin: 0 0 6px; font-size: 19px; color: #16213d; }
  .panel .pintro { color: var(--ink-soft); font-size: 15px; margin: 0 0 16px; }

  .prompt { border: 1px solid var(--paper-line); border-radius: 13px; padding: 15px; margin-bottom: 12px; }
  .prompt:focus-within { border-color: var(--blue-bright); box-shadow: 0 0 0 3px #dbe4ff; }
  .prompt p { font-weight: 650; font-size: 15px; margin: 0 0 9px; color: #23304f; }
  .prompt textarea { width: 100%; border: 1px solid var(--paper-line); border-radius: 10px; padding: 11px 12px; font-family: inherit; font-size: 15px; resize: vertical; min-height: 62px; background: #f6f8ff; outline: none; color: var(--ink); }
  .prompt textarea:focus { background: #fff; }

  .ideas-h { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px; }
  .ideas-h h4 { margin: 0; font-size: 15px; }
  .ideas-h span { font-size: 12.5px; color: var(--ink-faint); font-weight: 600; }
  .irow { display: flex; gap: 8px; margin-bottom: 8px; }
  .irow input { flex: 1; border: 1px solid var(--paper-line); border-radius: 10px; padding: 11px 12px; font-family: inherit; font-size: 15px; outline: none; }
  .irow input:focus { border-color: var(--blue-bright); box-shadow: 0 0 0 3px #dbe4ff; }
  .irow .star { width: 44px; border: 1px solid var(--paper-line); border-radius: 10px; background: #fff; color: #b9c0d6; font-size: 17px; }
  .irow .star.on { color: #f5a623; border-color: #f3d79a; background: #fff8ec; }
  .irow .del { width: 40px; border: 1px solid var(--paper-line); border-radius: 10px; background: #fff; color: #b9c0d6; }
  .irow .del:hover { color: #e0556a; border-color: #f3c4cc; }
  .add { width: 100%; border: 1px dashed #b9c0d6; border-radius: 10px; background: transparent; color: var(--ink-soft); padding: 10px; font-weight: 650; font-size: 14px; }
  .add:hover { border-color: var(--blue-bright); color: var(--blue-bright); }
  .saved { margin-top: 12px; font-size: 12.5px; color: var(--green); font-weight: 650; opacity: 0; transition: opacity .3s; }
  .saved.show { opacity: 1; }

  .crow { display: flex; align-items: flex-start; gap: 12px; padding: 13px 15px; border: 1px solid var(--paper-line); border-radius: 13px; margin-bottom: 10px; cursor: pointer; }
  .crow:hover { border-color: #b9c0d6; }
  .crow.on { border-color: var(--green); background: #eafaf2; }
  .cbox { width: 23px; height: 23px; border-radius: 7px; border: 2px solid #b9c0d6; flex: none; display: grid; place-items: center; color: #fff; margin-top: 1px; }
  .crow.on .cbox { background: var(--green); border-color: var(--green); }
  .crow .ct { font-size: 15px; color: #23304f; }
  .cscore { margin-top: 14px; padding: 14px 16px; border-radius: 12px; background: #f1f4fd; font-size: 15px; color: var(--ink-soft); }
  .cscore b { color: var(--ink); }

  /* article footer */
  .a-foot { margin-top: 34px; padding-top: 22px; border-top: 1px solid var(--paper-line); display: flex; align-items: center; gap: 14px; }
  .btn { border-radius: 12px; padding: 12px 20px; font-size: 15px; font-weight: 700; }
  .btn.primary { background: var(--blue-bright); color: #fff; }
  .btn.primary:hover { background: #2f5ee0; }
  .btn.ghost { color: var(--ink-soft); }
  .btn.ghost:hover { color: var(--ink); }
  .done-tag { display: inline-flex; align-items: center; gap: 8px; color: var(--green); font-weight: 700; }
  .spacer { flex: 1; }

  .empty { text-align: center; color: var(--ink-faint); padding: 70px 20px; }
  .empty .e-ico { font-size: 34px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="brand">journey</div>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="toolbar">
      <div class="tool"><button class="tbtn" title="Resources"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button><div class="tlabel">Resources</div></div>
      <div class="tool"><button class="tbtn" title="Educator Resources"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7c0-2 1.5-4 4-4 0 2-1 4-4 4z"/><path d="M12 7c0-2.5-2-4.5-5-4.5C6.5 5 8.5 7 12 7z"/><path d="M12 7c-3 0-6 2.2-6 6.5C6 18 9 21 12 21s6-3 6-7.5C18 9.2 15 7 12 7z"/></svg></button><div class="tlabel">Educator Resources</div></div>
      <div class="tool"><button class="tbtn" title="Share"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg></button><div class="tlabel">Share</div></div>
    </div>
    <div class="paper" id="paper"></div>
  </main>
</div>

<script>
/* ----------------------------- Icons ----------------------------- */
const I = {
  check: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2"><path d="m20 6-11 11-5-5"/></svg>',
  checkSm: '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="m20 6-11 11-5-5"/></svg>',
  play: '<svg width="24" height="24" viewBox="0 0 24 24" fill="#16213d"><path d="M8 5v14l11-7z"/></svg>',
};

/* ----------------------------- Data: Journey > Part > Project > Step > Article > blocks ----------------------------- */
const IMG = (id) => `https://images.unsplash.com/${id}?auto=format&fit=crop&w=640&q=60`;

const JOURNEY = {
  title: "Apply to 4-Year Colleges",
  parts: [
    {
      label: "Part 1", title: "Determine when you will apply",
      projects: [
        {
          title: "Begin the college application process",
          img: IMG("photo-1523050854058-8df90110c9f1"),
          steps: [
            {
              title: "The basics of applying to college",
              articles: [
                { title: "What's the deal with applying to college?", mins: 5,
                  intro: "Applying to college can feel like a maze. Here's the big picture so the steps ahead actually make sense.",
                  img: IMG("photo-1541339907198-e08756dedf3f"),
                  blocks: [
                    { type: "read", paragraphs: [
                      "At its core, a college application is a packet of information that helps a school decide whether you're a good fit — and whether they're a good fit for you. Most of it flows through one of a few <strong>common platforms</strong> (the Common App, Coalition, or a school's own portal).",
                      "You'll generally submit the same core pieces to every school: your <strong>transcript and grades</strong>, <strong>test scores</strong> (if required), a <strong>personal essay</strong>, <strong>activities</strong>, and <strong>recommendation letters</strong>. Schools then add their own supplemental questions on top.",
                      "The good news: you build most of this <strong>once</strong> and reuse it. This journey walks you through each piece in the order that makes them easiest to tackle.",
                    ]},
                    { type: "read", callout: { title: "Mindset", body: "You're not being judged as a person — you're assembling evidence that you'll thrive on their campus." }, paragraphs: [] },
                  ]
                },
                { title: "What admission committees are looking for", mins: 5,
                  intro: "Behind every decision is a real person reading fast. Knowing what they look for tells you where to spend your energy.",
                  img: IMG("photo-1577896851231-70ef18881754"),
                  blocks: [{ type: "read", paragraphs: [
                    "Admissions readers weigh your application along a few axes: <strong>academic fit</strong> (can you handle the coursework?), <strong>character and voice</strong> (who are you?), and <strong>fit with the school</strong> (will you add to the community?).",
                    "No single number makes or breaks you. A strong essay can offset an average test score; a clear, focused activities list can matter more than a long, scattered one.",
                  ]}]
                },
                { title: "Get to know admissions timelines", mins: 5,
                  intro: "Deadlines sneak up. Mapping them now keeps you calm later.",
                  img: IMG("photo-1506784983877-45594efa4cbe"),
                  blocks: [{ type: "read", paragraphs: [
                    "Most schools offer <strong>Early Decision / Early Action</strong> (deadlines in November) and <strong>Regular Decision</strong> (deadlines in December–January). Early options can boost your chances but may require commitment.",
                    "Work backward from the earliest deadline you care about and give yourself a two-week buffer for essays and recommendation letters.",
                  ]}]
                },
              ]
            },
            {
              title: "Nail your application strategy",
              articles: [
                { title: "Choose your decision plan", mins: 5, intro: "Early or regular? Binding or not? Here's how to choose.", blocks: [] },
                { title: "Check the requirements", mins: 5, intro: "Every school's checklist is a little different. Confirm yours.", blocks: [] },
                { title: "Start gathering materials", mins: 5, intro: "Get your transcript, scores, and accounts in order.", blocks: [] },
                { title: "Where to go from here", mins: 5, intro: "A quick recap and your next move.", blocks: [] },
              ]
            },
          ]
        }
      ]
    },
    {
      label: "Part 2", title: "Create your college application materials",
      projects: [
        {
          title: "Write your college essay",
          img: IMG("photo-1455390582262-044cdead277a"),
          steps: [
            {
              title: "Pick your topic",
              articles: [
                { title: "Why the essay matters", mins: 4,
                  intro: "The essay is the one place you speak in your own voice. Here's why it carries so much weight.",
                  img: IMG("photo-1457369804613-52c61a468e7d"),
                  blocks: [
                    { type: "video", title: "The essay's role in your application", caption: "Dr. Reyes · Dean of Admissions", note: "Grades get you considered; the essay is how a reader decides they want you in the room." },
                    { type: "read", paragraphs: [
                      "A reader may spend under three minutes with your essay. That sounds discouraging, but it's freeing: you don't need to be profound, you need to be <strong>clear, specific, and unmistakably you</strong>.",
                      "They're really asking one question — <strong>what would it be like to have this person here?</strong> Everything you write should help them answer it.",
                    ], callout: { title: "Reframe", body: "You're not writing an essay. You're giving a stranger a reason to root for you." } },
                  ]
                },
                { title: "Brainstorm essay topics", mins: 10,
                  intro: "Now find the story only you can tell. Watch the overview, review the signs of a strong topic, then use the tool to surface and star ideas.",
                  blocks: [
                    { type: "video", title: "What makes a great essay topic", caption: "Mr. Alvarez · Former Admissions Reader", note: "The best topics are specific and personal — they reveal how you think, not just what you've achieved." },
                    { type: "read", paragraphs: [
                      "A strong topic doesn't have to be dramatic. Some of the most memorable essays are about a job at a taco stand or learning to parallel park. What they share is <strong>insight</strong>.",
                      "Look for something <strong>specific</strong> (one moment), <strong>honest</strong> (you actually care), and <strong>revealing</strong> (it shows a value or a change).",
                    ], callout: { title: "Quick test", body: "If your topic makes you a little nervous to share, that's often a sign it's the right one." } },
                    { type: "tool", title: "Topic brainstorm", pintro: "Answer a few prompts to surface raw material, then jot down topic ideas they spark. Star the ones worth exploring.",
                      prompts: [
                        "Describe a small, ordinary moment from the last year that stuck with you. Why does it linger?",
                        "What's something you believe that most people around you don't?",
                        "When have you changed your mind about something important?",
                      ] },
                  ]
                },
                { title: "Pressure-test your topic", mins: 3,
                  intro: "Have a front-runner? Run it through this checklist — the more boxes you can honestly check, the stronger it is.",
                  blocks: [
                    { type: "checklist", title: "Topic strength check", pintro: "Picture your strongest idea and check each statement that's true of it.",
                      items: [
                        "It focuses on one specific moment, not my whole life story.",
                        "It's something I genuinely care about.",
                        "It reveals how I think, what I value, or how I've grown.",
                        "Only I could have written it.",
                        "I can show it with concrete details, not abstractions.",
                      ] },
                  ]
                },
              ]
            },
            { title: "Draft your essay", articles: [
              { title: "Outline your structure", mins: 6, intro: "Give your story a shape before you fill it in.", blocks: [] },
              { title: "Write a messy first draft", mins: 12, intro: "Get it all down — you'll fix it later.", blocks: [] },
            ]},
          ]
        },
        {
          title: "Build your resume",
          img: IMG("photo-1586281380349-632531db7ed4"),
          steps: [
            {
              title: "Resume basics",
              articles: [
                { title: "Resume Fundamentals", mins: 5,
                  intro: "A resume is your personal highlight reel—a quick snapshot that shows employers what you've done and what you can do.",
                  img: IMG("photo-1586281380117-5a60ae2050cc"),
                  blocks: [{ type: "read", paragraphs: [
                    "Keep your contact info simple: name, phone, school email, and useful links like LinkedIn or a portfolio.",
                    "Include a short summary or objective: a couple of sentences that show who you are and what you're aiming for. Highlight your skills—specific tools or strengths that match the job, not generic buzzwords.",
                    "The experience section is key. List jobs, internships, or campus roles, focusing on achievements, not just duties. Use action verbs and measurable results, like “Organized a fundraiser that raised $3,000.”",
                    "Add education with your major, school, graduation date, and notable projects or honors. Optional sections like projects, certifications, or leadership roles can help you stand out.",
                    "A resume isn't a life story—it's a curated list of your best moments, tailored to the job, clean, and results-focused. Do it right, and you'll make a strong first impression.",
                  ]}]
                },
                { title: "Turn duties into achievements", mins: 6, intro: "Swap “responsible for” lines for results that pop.", blocks: [] },
                { title: "Polish and proofread", mins: 4, intro: "Small errors cost you. Here's your final pass.", blocks: [] },
              ]
            }
          ]
        }
      ]
    },
    { label: "Part 3", title: "Submit your applications",
      projects: [{ title: "Complete and submit", img: IMG("photo-1450101499163-c8848c66ca85"),
        steps: [{ title: "Final review", articles: [{ title: "Pre-submit checklist", mins: 5, intro: "One last sweep before you hit submit.", blocks: [] }] }] }] },
    { label: "Part 4", title: "Secure financial aid",
      projects: [{ title: "Fund your education", img: IMG("photo-1554224155-6726b3ff858f"),
        steps: [{ title: "FAFSA & aid", articles: [{ title: "Start the FAFSA", mins: 8, intro: "The form that unlocks most aid.", blocks: [] }] }] }] },
    { label: "Part 5", title: "Make the college decision",
      projects: [{ title: "Choose where to go", img: IMG("photo-1541339907198-e08756dedf3f"),
        steps: [{ title: "Compare offers", articles: [{ title: "Weigh your options", mins: 6, intro: "Compare cost, fit, and feel.", blocks: [] }] }] }] },
  ]
};

/* ----------------------------- Flatten ----------------------------- */
const flat = [];
JOURNEY.parts.forEach((part, pi) => part.projects.forEach((proj, pj) => proj.steps.forEach((step, si) => (step.articles||[]).forEach((article, ai) =>
  flat.push({ part, proj, step, article, pi, pj, si, ai, id: `${pi}-${pj}-${si}-${ai}` })))));

const state = {
  view: "journey",           // "journey" | "project"
  currentId: "0-0-0-0",      // loaded article
  curProject: { pi: 0, pj: 0 },
  openParts: new Set([0]),   // expanded parts in journey view
  openSteps: new Set(["0-0-0"]), // expanded steps in project view
  done: new Set(),
  ideas: {}, answers: {}, checks: {},
};

/* ----------------------------- Helpers ----------------------------- */
const cur = () => flat.find(f => f.id === state.currentId);
const el = (t, c) => { const e = document.createElement(t); if (c) e.className = c; return e; };
const idsIn = (fn) => flat.filter(fn).map(f => f.id);
const doneN = (ids) => ids.filter(id => state.done.has(id)).length;
const allDone = (ids) => ids.length > 0 && ids.every(id => state.done.has(id));

/* ----------------------------- Project card ----------------------------- */
function projCard(pi, pj, { clickable }) {
  const proj = JOURNEY.parts[pi].projects[pj];
  const ids = idsIn(f => f.pi===pi && f.pj===pj);
  const done = allDone(ids);
  const tag = clickable ? "button" : "div";
  const card = el(tag, "proj-card");
  card.innerHTML = `
    <div class="proj-media" style="background-image:url('${proj.img}')"></div>
    <div class="proj-badge ${done?"done":""}">${done ? I.check : (pj+1)}</div>
    <div class="proj-name">${proj.title}</div>`;
  if (clickable) card.onclick = () => openProject(pi, pj);
  return card;
}

/* ----------------------------- Sidebar ----------------------------- */
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "";
  if (state.view === "journey") renderJourneyNav(sb);
  else renderProjectNav(sb);
}

function renderJourneyNav(sb) {
  const exit = el("button", "nav-btn");
  exit.innerHTML = `<span class="arr">&larr;</span> Exit Journey`;
  exit.onclick = () => {};
  sb.appendChild(exit);

  const head = el("div", "journey-head");
  const pct = Math.round(doneN(flat.map(f=>f.id)) / flat.length * 100);
  head.innerHTML = `<div class="kick">Journey</div><div class="journey-title">${JOURNEY.title}</div><div class="pbar"><span style="width:${pct}%"></span></div>`;
  sb.appendChild(head);

  JOURNEY.parts.forEach((part, pi) => {
    const open = state.openParts.has(pi);
    const partEl = el("div", "part" + (open ? " open" : ""));
    const h = el("button", "part-head");
    h.innerHTML = `<div class="pt-body"><div class="part-label">${part.label}</div><div class="part-title">${part.title}</div></div><span class="chev">&#9660;</span>`;
    h.onclick = () => { state.openParts.has(pi) ? state.openParts.delete(pi) : state.openParts.add(pi); renderSidebar(); };
    partEl.appendChild(h);
    const body = el("div", "part-body");
    part.projects.forEach((_, pj) => body.appendChild(projCard(pi, pj, { clickable: true })));
    partEl.appendChild(body);
    sb.appendChild(partEl);
  });
}

function renderProjectNav(sb) {
  const { pi, pj } = state.curProject;
  const back = el("button", "nav-btn");
  back.innerHTML = `<span class="arr">&larr;</span> Back to Journey`;
  back.onclick = () => { state.view = "journey"; state.openParts.add(pi); renderAll(); };
  sb.appendChild(back);

  const pinned = el("div", "proj-pinned");
  pinned.appendChild(projCard(pi, pj, { clickable: false }));
  sb.appendChild(pinned);

  const proj = JOURNEY.parts[pi].projects[pj];
  proj.steps.forEach((step, si) => {
    const key = `${pi}-${pj}-${si}`;
    const open = state.openSteps.has(key);
    const stepEl = el("div", "step" + (open ? " open" : ""));
    const h = el("button", "step-head");
    h.innerHTML = `<div class="st-body"><div class="step-label">Step ${si+1}</div><div class="step-title">${step.title}</div></div><span class="chev">&#9660;</span>`;
    h.onclick = () => { state.openSteps.has(key) ? state.openSteps.delete(key) : state.openSteps.add(key); renderSidebar(); };
    stepEl.appendChild(h);
    const body = el("div", "step-body");
    step.articles.forEach((article, ai) => {
      const id = `${pi}-${pj}-${si}-${ai}`;
      const row = el("button", "art-row" + (state.done.has(id) ? " done" : "") + (id===state.currentId ? " active" : ""));
      row.innerHTML = `<span class="art-ico"></span><span class="art-rbody"><span class="art-rtitle">${article.title}</span><span class="art-mins">${article.mins} mins</span></span><span class="art-check" data-toggle="${id}">${state.done.has(id) ? I.checkSm : ""}</span>`;
      row.onclick = (e) => {
        if (e.target.closest("[data-toggle]")) { toggleDone(id); return; }
        state.currentId = id; renderAll();
      };
      body.appendChild(row);
    });
    stepEl.appendChild(body);
    sb.appendChild(stepEl);
  });
}

/* ----------------------------- Content (white card) ----------------------------- */
function renderPaper() {
  const c = cur();
  const paper = document.getElementById("paper");
  const sibs = c.step.articles;
  const blocks = c.article.blocks || [];
  let h = `<div class="a-kick">Article ${c.ai+1}/${sibs.length}</div><h1 class="a-h1">${c.article.title}</h1>`;
  if (c.article.intro) h += `<p class="a-lead">${c.article.intro}</p>`;
  if (c.article.img) h += `<figure class="a-fig"><img src="${c.article.img}" alt="" onerror="this.style.display='none'"/></figure>`;

  if (!blocks.length && !c.article.img) {
    h += `<div class="empty"><div class="e-ico">📝</div><div style="font-weight:700;color:var(--ink-soft)">This article isn't built out in the prototype yet.</div><div style="margin-top:6px;font-size:14px">Try <b>Resume Fundamentals</b> (Part 2 → Build your resume) or <b>Brainstorm essay topics</b> for fully built articles.</div></div>`;
  } else {
    h += `<div class="a-body">`;
    blocks.forEach((b, bi) => { h += blockHTML(b, c.id, bi); });
    h += `</div>`;
  }

  // footer
  const idx = flat.findIndex(f => f.id === state.currentId);
  const next = flat[idx+1];
  const isDone = state.done.has(c.id);
  h += `<div class="a-foot">
    ${isDone ? `<span class="done-tag">${I.check.replace(/#fff/g,'#2bb673')} Completed</span>` : `<button class="btn primary" id="completeBtn">Mark complete</button>`}
    <div class="spacer"></div>
    ${next ? `<button class="btn ghost" id="nextBtn">Next article →</button>` : ``}</div>`;

  paper.innerHTML = h;
  paper.parentElement.scrollTo({ top: 0 });
  wirePaper(c.id, blocks, next);
}

function blockHTML(b, stepId, bi) {
  if (b.type === "read") {
    let s = b.paragraphs.map(p => `<p>${p}</p>`).join("");
    if (b.callout) s += `<div class="callout"><b>${b.callout.title}</b>${b.callout.body}</div>`;
    return s;
  }
  if (b.type === "video") {
    return `<div class="vid"><button class="play" data-play>${I.play}</button><div class="cap"><b>${b.title}</b><span>${b.caption}</span></div></div><p>${b.note}</p>`;
  }
  if (b.type === "tool") {
    let s = `<div class="panel"><div class="panel-tag"><span class="dot"></span>Interactive tool</div><h3>${b.title}</h3><p class="pintro">${b.pintro}</p>`;
    b.prompts.forEach((q, qi) => { const k = `${stepId}-${qi}`; s += `<div class="prompt"><p>${qi+1}. ${q}</p><textarea data-akey="${k}" placeholder="Type your thoughts…">${state.answers[k]||""}</textarea></div>`; });
    s += `<div class="ideas-h"><h4>Topic ideas</h4><span id="ideasCount"></span></div><div id="ideasList"></div><button class="add" id="addIdea">+ Add a topic idea</button><div class="saved" id="saved">✓ Saved</div></div>`;
    return s;
  }
  if (b.type === "checklist") {
    let s = `<div class="panel"><div class="panel-tag"><span class="dot"></span>Interactive tool</div><h3>${b.title}</h3><p class="pintro">${b.pintro}</p>`;
    b.items.forEach((it, ci) => { const k = `${stepId}-${ci}`; const on = state.checks[k]; s += `<div class="crow ${on?"on":""}" data-ckey="${k}"><div class="cbox">${on?I.checkSm:""}</div><div class="ct">${it}</div></div>`; });
    s += `<div class="cscore" id="cscore"></div></div>`;
    return s;
  }
  return "";
}

function wirePaper(stepId, blocks, next) {
  const cb = document.getElementById("completeBtn"); if (cb) cb.onclick = () => { state.done.add(stepId); renderAll(); };
  const nb = document.getElementById("nextBtn"); if (nb && next) nb.onclick = () => { state.currentId = next.id; ensureProjectFor(next); renderAll(); };
  document.querySelectorAll("[data-play]").forEach(b => b.onclick = () => { const v = b.closest(".vid"); v.innerHTML = `<div style="color:#fff;text-align:center"><div style="font-size:34px">▶</div><div style="font-size:13px;opacity:.85;margin-top:6px">Playing… (prototype)</div></div>`; v.style.background = "#101a32"; });
  document.querySelectorAll("textarea[data-akey]").forEach(t => t.oninput = () => { state.answers[t.dataset.akey] = t.value; flashSaved(); });
  if (blocks.some(b => b.type === "tool")) { renderIdeas(stepId); const a = document.getElementById("addIdea"); if (a) a.onclick = () => { getIdeas(stepId).push({text:"",star:false}); renderIdeas(stepId, true); }; }
  if (blocks.some(b => b.type === "checklist")) {
    document.querySelectorAll("[data-ckey]").forEach(r => r.onclick = () => { state.checks[r.dataset.ckey] = !state.checks[r.dataset.ckey]; renderPaper(); });
    updateScore(stepId, blocks.find(b => b.type === "checklist"));
  }
}

/* brainstorm */
function getIdeas(id){ if(!state.ideas[id]) state.ideas[id]=[{text:"The summer I ran my grandfather's fruit stand",star:true},{text:"Why I keep a list of questions I can't answer",star:false},{text:"",star:false}]; return state.ideas[id]; }
function renderIdeas(id, focus){ const list=document.getElementById("ideasList"); if(!list) return; const ideas=getIdeas(id); list.innerHTML=""; ideas.forEach((idea,i)=>{ const r=el("div","irow"); r.innerHTML=`<input value="${idea.text.replace(/"/g,'&quot;')}" placeholder="A topic idea…"/><button class="star ${idea.star?"on":""}">${idea.star?"★":"☆"}</button><button class="del">✕</button>`; const [inp,st,dl]=r.children; inp.oninput=()=>{idea.text=inp.value;flashSaved();countIdeas(id);}; st.onclick=()=>{idea.star=!idea.star;renderIdeas(id);flashSaved();}; dl.onclick=()=>{ideas.splice(i,1);if(!ideas.length)ideas.push({text:"",star:false});renderIdeas(id);flashSaved();}; list.appendChild(r); }); countIdeas(id); if(focus){const ins=list.querySelectorAll("input");ins[ins.length-1].focus();} }
function countIdeas(id){ const e=document.getElementById("ideasCount"); if(!e)return; const ideas=getIdeas(id); const f=ideas.filter(i=>i.text.trim()).length; const s=ideas.filter(i=>i.star&&i.text.trim()).length; e.textContent=`${f} idea${f===1?"":"s"} · ${s} starred`; }
function updateScore(id, b){ const e=document.getElementById("cscore"); if(!e||!b)return; const n=b.items.filter((_,ci)=>state.checks[`${id}-${ci}`]).length; const t=b.items.length; const m=n>=4?"Strong topic — go with it.":n>=2?"Promising — keep sharpening it.":"Worth brainstorming a few more options."; e.innerHTML=`<b>${n}/${t} checked.</b> ${m}`; }
let savedT; function flashSaved(){ const e=document.getElementById("saved"); if(!e)return; e.classList.add("show"); clearTimeout(savedT); savedT=setTimeout(()=>e.classList.remove("show"),1300); }

/* ----------------------------- Orchestration ----------------------------- */
function toggleDone(id){ state.done.has(id) ? state.done.delete(id) : state.done.add(id); renderAll(); }
function ensureProjectFor(f){ state.curProject = { pi: f.pi, pj: f.pj }; state.openSteps.add(`${f.pi}-${f.pj}-${f.si}`); }
function openProject(pi, pj){
  state.view = "project"; state.curProject = { pi, pj };
  const first = flat.find(f => f.pi===pi && f.pj===pj);
  state.openSteps.add(`${pi}-${pj}-0`);
  if (first && !flat.find(f=>f.id===state.currentId && f.pi===pi && f.pj===pj)) state.currentId = first.id;
  renderAll();
}
function renderProgress(){ /* handled inside journey head render */ }
function renderAll(){ renderSidebar(); renderPaper(); }

renderAll();
</script>
